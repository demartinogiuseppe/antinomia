<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="nebula" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#1a0b2e"/>
      <stop offset="50%" stop-color="#0a0118"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="lens" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#ec4899" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#nebula)"/>

  <!-- Two intersecting circles (vesica piscis) -->
  <g filter="url(#glow)">
    <circle cx="155" cy="200" r="100" fill="none" stroke="#a855f7" stroke-width="2.5" opacity="0.9"/>
    <circle cx="245" cy="200" r="100" fill="none" stroke="#3b82f6" stroke-width="2.5" opacity="0.9"/>
  </g>

  <!-- Central tension lens (the contradiction) -->
  <path d="M 200,113 A 100,100 0 0,1 200,287 A 100,100 0 0,1 200,113 Z"
        fill="url(#lens)" opacity="0.85" filter="url(#glow)"/>
</svg>
