<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="60%" stop-color="#0a0118"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- Concentric layers — each a deeper layer -->
  <g filter="url(#glow2)">
    <circle cx="200" cy="200" r="160" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.35"/>
    <circle cx="200" cy="200" r="130" fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.5"/>
    <circle cx="200" cy="200" r="100" fill="none" stroke="#a855f7" stroke-width="2"   opacity="0.7"/>
    <circle cx="200" cy="200" r="70"  fill="none" stroke="#ec4899" stroke-width="2"   opacity="0.85"/>
    <circle cx="200" cy="200" r="40"  fill="none" stroke="#f59e0b" stroke-width="2.5" opacity="1"/>
  </g>

  <!-- Innermost core: the irreducible tension -->
  <circle cx="200" cy="200" r="14" fill="#ffffff" opacity="0.95" filter="url(#glow2)"/>
</svg>
