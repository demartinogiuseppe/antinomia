<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg3" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a0b2e"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="arc1" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="arc2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="400" height="400" fill="url(#bg3)"/>

  <!-- Two diverging arcs forming an implied "A" / a fertile gap -->
  <g filter="url(#glow3)" fill="none" stroke-width="6" stroke-linecap="round">
    <!-- Left leg -->
    <path d="M 130,320 Q 170,150 200,90" stroke="url(#arc1)"/>
    <!-- Right leg -->
    <path d="M 270,320 Q 230,150 200,90" stroke="url(#arc2)"/>
    <!-- Crossbar of the A — the tension itself -->
    <line x1="155" y1="240" x2="245" y2="240" stroke="#ffffff" stroke-width="3" opacity="0.85"/>
  </g>

  <!-- Apex spark -->
  <circle cx="200" cy="90" r="6" fill="#ffffff" filter="url(#glow3)"/>
</svg>
